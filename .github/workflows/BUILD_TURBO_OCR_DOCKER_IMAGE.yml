name: Build and Push TurboOCR to Docker Hub

on:
  workflow_dispatch:
    inputs:
      dest_tag:
        description: 'Destination tag for Docker Hub (e.g., v2.3.0, latest)'
        required: true
        default: 'v2.3.0'
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # CUDA/C++ builds require substantial disk space. 
      # This step frees up ~30GB on the standard GitHub Ubuntu runner.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push GPU Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.gpu
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/turboocr:${{ inputs.dest_tag }}
          provenance: false 
          # Utilizes GitHub Actions cache to significantly speed up future builds
          cache-from: type=gha
          # DELETE the cache-to line so it stops exporting:
          # cache-to: type=gha,mode=max
